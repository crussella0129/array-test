name: ci

# The template's promise, kept live: every push re-audits the committed founding
# ledger (tests/t15b_durable.rs) alongside the full suite — history cannot rot
# silently on any fork or template instance.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo build --all-targets
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  # F11/T8b: features gated on host capabilities (network namespaces, read-only mounts,
  # real Hypothesis property testing, and the live CBMC `proved`-tier proof) are marked
  # #[ignore] so the job above cannot falsely pass them. This privileged job installs the
  # tools and actually exercises them — otherwise a regression would ship green.
  privileged-tests:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
      options: --privileged --cap-add=SYS_ADMIN
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y python3-pip cbmc
      - run: pip install --break-system-packages hypothesis || pip install hypothesis
      - run: cargo test -- --ignored

  # C1–C3 (D36): build the container image and prove the SHIPPED artifact works — the
  # binary runs, the proved tier's CBMC and the property tier's Hypothesis are provisioned,
  # and under --privileged the sandbox is live (net_isolated recorded in the ledger).
  # Green rounds alone would be theater for the sandbox claim; the ledger grep is the
  # witness that isolation actually applied inside this image.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t array-test:ci .
      - name: Version and help smoke
        run: |
          docker run --rm array-test:ci --version
          docker run --rm array-test:ci help >/dev/null
      - name: Unprivileged round over the quickstart workspace
        run: docker run --rm array-test:ci run --units /opt/array-test/examples/quickstart/units --state /tmp/state
      - name: Proved tier — CBMC discharges the committed proof inside the image
        run: docker run --rm array-test:ci run --units /opt/array-test/examples/proved-cbmc/units --state /tmp/state
      - name: Property tooling present (Hypothesis)
        run: docker run --rm --entrypoint python3 array-test:ci -c "import hypothesis; print('hypothesis', hypothesis.__version__)"
      - name: Privileged — the sandbox is live (net_isolated recorded per confirmation)
        run: |
          docker run --rm --privileged --entrypoint /bin/sh array-test:ci -ec '
            array-test run --units /opt/array-test/examples/quickstart/units --state /tmp/s
            grep -q "net_isolated" /tmp/s/ledger/confirmations.ndjson
            echo "sandbox live: net_isolated recorded"'
      - name: sprint-loops Test-phase shim works in the image
        run: |
          docker run --rm --entrypoint /bin/sh array-test:ci -ec '
            cp -r /opt/array-test/examples/quickstart/units /w
            array-test-phase --units /w --state /tmp/phase-state'
      - name: Genesis parity (C5) — the image re-verifies the committed founding ledger
        # Zero-toolchain independent verification of this repo's own genesis: anyone
        # holding the image + the state dir can audit the founding history (D22).
        run: docker run --rm -v "$PWD/selfhost/state:/state:ro" array-test:ci verify --state /state

  # C4 (D37): publish the image to GHCR — by digest, the only pin that matters. Runs only
  # on a push to main whose test, privileged, and image-proof jobs are all green. The
  # digest is emitted to the job summary; consumers pin `@sha256:…`, never a mutable tag.
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, privileged-tests, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t array-test:publish .
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Tag and push (crate version + commit)
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          docker tag array-test:publish "$IMAGE:$VERSION"
          docker tag array-test:publish "$IMAGE:sha-${GITHUB_SHA::7}"
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:sha-${GITHUB_SHA::7}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:$VERSION")
          echo "## Image published" >> "$GITHUB_STEP_SUMMARY"
          echo "Pin by digest (never a tag):" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull $DIGEST" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "published: $DIGEST"
