name: ci

# The template's promise, kept live: every push re-audits the committed founding
# ledger (tests/t15b_durable.rs) alongside the full suite — history cannot rot
# silently on any fork or template instance.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo build --all-targets
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  # F11: the three headline features gated on host capabilities (network namespaces,
  # read-only mounts, real Hypothesis property testing) are marked #[ignore] so the
  # job above cannot falsely pass them. This privileged job actually exercises them —
  # otherwise a regression in the runner's isolation setup would ship green.
  privileged-tests:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
      options: --privileged --cap-add=SYS_ADMIN
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y python3-pip
      - run: pip install --break-system-packages hypothesis || pip install hypothesis
      - run: cargo test -- --ignored
